<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>2Table CalculatorMax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
      max-width: 960px;
      margin: auto;
      background-color: #f4f6f9;
      color: #222;
    }

    h2 {
      text-align: center;
      color: #0066cc;
      font-size: 28px;
      margin-bottom: 15px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 20px;
      background-color: #fff;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 14px;
      text-align: center;
      font-size: 18px;
    }

    th {
      background-color: #e6f0ff;
      color: #003366;
      font-weight: bold;
    }

    .num-input {
      width: 110px;
      font-size: 18px;
      padding: 8px;
      text-align: right;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin-bottom: 25px;
    }

    button {
      padding: 14px 22px;
      font-size: 18px;
      border-radius: 6px;
      border: none;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      min-width: 200px;
    }

    button:hover {
      background-color: #005bb5;
    }

    .summary {
      font-size: 20px;
      font-weight: bold;
      margin: 10px 0;
      text-align: center;
    }

    .summary span {
      color: #003366;
    }

    .odds-group {
      display: flex;
      align-items: center;
      gap: 5px;
      justify-content: center;
    }

    .danger-btn {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      min-width: auto;
    }

    .danger-btn:hover {
      background-color: #c82333;
    }

    .amount-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .amount-dual-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .amount-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .amount-field label {
      font-size: 11px;
      font-weight: bold;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-thb {
      border: 2px solid #007bff !important;
      background: #f0f7ff;
    }

    .input-thb:focus {
      border-color: #0056b3 !important;
      outline: none;
      background: #e0efff;
    }

    .input-usdt {
      border: 2px solid #f0a500 !important;
      background: #fffbf0;
    }

    .input-usdt:focus {
      border-color: #d48c00 !important;
      outline: none;
      background: #fff3d0;
    }

    .divider-label {
      font-size: 16px;
      color: #888;
      font-weight: bold;
      padding: 0 2px;
      margin-top: 14px;
    }

    .paste-btn-row {
      display: flex;
      gap: 4px;
    }

    .mini-btn {
      min-width: auto;
      padding: 5px 8px;
      font-size: 12px;
      line-height: 1.2;
      background-color: #6c757d;
      border-radius: 5px;
    }

    .mini-btn:hover {
      background-color: #5a6268;
    }

    .mini-btn.copied {
      background-color: #28a745;
    }

    .mini-btn.pasted {
      background-color: #fd7e14;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .left-panel {
      flex: 1 1 320px;
      text-align: left;
    }

    .left-panel h2 {
      text-align: left;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .rate-box {
      font-size: 16px;
      font-weight: bold;
      color: #003366;
      text-align: left;
    }

    .rate-value {
      display: inline-block;
      min-width: 120px;
      color: #dc3545;
      font-size: 18px;
      font-weight: bold;
      margin: 0 6px;
    }

    .rate-input {
      width: 140px;
      font-size: 18px;
      font-weight: bold;
      padding: 6px 8px;
      text-align: right;
      border: 1px solid #ccc;
      border-radius: 6px;
      color: #dc3545;
    }

    .rate-source {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      color: #666;
      font-weight: normal;
    }

    .converter-box {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      flex: 0 1 360px;
      margin-bottom: 0;
    }

    .converter-title {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #003366;
      margin-bottom: 12px;
    }

    .converter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      align-items: flex-start;
    }

    .converter-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 150px;
    }

    .converter-item label {
      font-size: 14px;
      font-weight: bold;
      color: #444;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .converter-result {
      font-size: 14px;
      color: #dc3545;
      font-weight: bold;
      min-height: 18px;
      text-align: center;
    }

    .required-hint {
      color: #c43d00;
      font-size: 18px;
    }

    @media (max-width: 768px) {
      .top-row {
        flex-direction: column;
      }

      .left-panel,
      .converter-box {
        width: 100%;
      }

      .left-panel h2,
      .rate-box {
        text-align: center;
      }

      .num-input {
        width: 90px;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="top-row">
    <div class="left-panel">
      <h2>2 CalculatorMax By Super Update 13.5.69</h2>

      <div class="rate-box">
        อัตรา 1 USDT =
        <span id="usdt_rate_text" class="rate-value">กำลังโหลด...</span>
        <input
          type="number"
          id="usdt_rate_input"
          class="rate-input"
          step="0.01"
          min="0"
          style="display:none;"
          placeholder="กรอกค่าเงิน"
        />
        บาท
        <span id="rate_source" class="rate-source"></span>
      </div>
    </div>

    <div class="converter-box">
      <div class="converter-title">แปลงสกุลเงิน</div>

      <div class="converter-grid">
        <div class="converter-item">
          <label for="convert_thb_input">
            บาท → USDT
            <button type="button" class="mini-btn" onclick="copyTextById('convert_thb_result', this)">copy</button>
          </label>

          <input type="text" id="convert_thb_input" class="num-input money-input" />
          <div class="converter-result" id="convert_thb_result"></div>
        </div>

        <div class="converter-item">
          <label for="convert_usdt_input">
            USDT → บาท
            <button type="button" class="mini-btn" onclick="copyTextById('convert_usdt_result', this)">copy</button>
          </label>

          <input type="text" id="convert_usdt_input" class="num-input money-input" />
          <div class="converter-result" id="convert_usdt_result"></div>
        </div>
      </div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>เว็บ</th>

        <th>
          เงินทุน
          <div style="font-size:12px; font-weight:normal; color:#555; margin-top:4px;">
            <span style="color:#0056b3;">■</span> บาท &nbsp;|&nbsp;
            <span style="color:#d48c00;">■</span> USDT (แปลงอัตโนมัติ)
          </div>
        </th>

        <th>ค่าน้ำ</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>เสมอ / ต่อ / ต่ำ</td>

        <td>
          <div class="amount-group">
            <div class="amount-dual-row">
              <div class="amount-field">
                <label>บาท</label>
                <input type="text" id="draw_amt_thb" class="num-input money-input input-thb" placeholder="0" />
              </div>

              <div class="divider-label">/</div>

              <div class="amount-field">
                <label>USDT</label>
                <input type="text" id="draw_amt_usdt" class="num-input money-input input-usdt" placeholder="0" />
              </div>
            </div>

            <div class="paste-btn-row">
              <button type="button" class="mini-btn" onclick="pasteToInput('draw_amt_thb', this, 'thb')">วางบาท</button>
              <button type="button" class="mini-btn" onclick="pasteToInput('draw_amt_usdt', this, 'usdt')">วาง USDT</button>
            </div>
          </div>
        </td>

        <td>
          <div class="odds-group">
            <input type="number" id="draw_odds_main" class="num-input" min="0" style="width:70px;" />
            .
            <input type="number" id="draw_odds_decimal" class="num-input" min="0" max="99" style="width:70px;" />

            <button
              class="danger-btn"
              onclick="draw_odds_main.value=''; draw_odds_decimal.value=''; forceAutoWin1Amount(); suggestWin1MinimumOdds();"
            >
              ล้าง
            </button>
          </div>
        </td>
      </tr>

      <tr>
        <td>ชนะ 1</td>

        <td>
          <div class="amount-group">
            <div class="amount-dual-row">
              <div class="amount-field">
                <label>บาท</label>
                <input type="text" id="win1_amt_thb" class="num-input money-input input-thb" placeholder="0" />
              </div>

              <div class="divider-label">/</div>

              <div class="amount-field">
                <label>USDT</label>
                <input type="text" id="win1_amt_usdt" class="num-input money-input input-usdt" placeholder="0" />
              </div>
            </div>

            <div class="paste-btn-row">
              <button type="button" class="mini-btn" onclick="pasteToInput('win1_amt_thb', this, 'thb')">วางบาท</button>
              <button type="button" class="mini-btn" onclick="pasteToInput('win1_amt_usdt', this, 'usdt')">วาง USDT</button>
            </div>
          </div>
        </td>

        <td>
          <div class="odds-group">
            <input type="text" id="win1_odds" class="num-input" placeholder="0.00" inputmode="decimal" />

            <button
              class="danger-btn"
              onclick="win1_odds.value=''; win1_amt_thb.value=''; win1_amt_usdt.value=''; calculate();"
            >
              ล้าง
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="summary">รวมเงินทุนทั้งหมด: <span id="total_investment">0</span> บาท</div>
  <div class="summary">รวมทุนฝั่งชนะ 1: <span id="total_win12">0</span> บาท</div>
  <div class="summary required-hint" id="required-win1-odds"></div>

  <div class="button-container">
    <button onclick="forceAutoWin1Amount()">เฉลี่ยกำไรให้เท่ากัน</button>
    <button onclick="maximizeWinProfit()">คำนวณกำไรสูงสุด</button>
    <button onclick="clearAll()">🧹 ล้างทั้งหมด</button>
  </div>

  <h2>ผลการคำนวณ</h2>

  <table>
    <thead>
      <tr>
        <th>กรณี</th>
        <th>ยอดรวม</th>
        <th>กำไร</th>
      </tr>
    </thead>

    <tbody id="result-table">
      <tr><td colspan="3">-</td></tr>
    </tbody>
  </table>

  <script>
    const drawAmtThb = document.getElementById("draw_amt_thb");
    const drawAmtUsdt = document.getElementById("draw_amt_usdt");
    const win1AmtThb = document.getElementById("win1_amt_thb");
    const win1AmtUsdt = document.getElementById("win1_amt_usdt");

    const drawOddsMain = document.getElementById("draw_odds_main");
    const drawOddsDecimal = document.getElementById("draw_odds_decimal");
    const win1Odds = document.getElementById("win1_odds");

    const totalInvestment = document.getElementById("total_investment");
    const totalWin12 = document.getElementById("total_win12");
    const resultTable = document.getElementById("result-table");
    const requiredWin1OddsDisplay = document.getElementById("required-win1-odds");

    const usdtRateText = document.getElementById("usdt_rate_text");
    const usdtRateInput = document.getElementById("usdt_rate_input");
    const rateSource = document.getElementById("rate_source");

    const convertThbInput = document.getElementById("convert_thb_input");
    const convertUsdtInput = document.getElementById("convert_usdt_input");
    const convertThbResult = document.getElementById("convert_thb_result");
    const convertUsdtResult = document.getElementById("convert_usdt_result");

    let usdtRate = 0;
    let isManualRate = false;

    function unformatComma(value) {
      return String(value || "").replace(/,/g, "");
    }

    function formatNumberWithComma(value) {
      const parts = String(value).split(".");
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      return parts.join(".");
    }

    function parseAmount(input) {
      return parseFloat(unformatComma(input.value)) || 0;
    }

    function format(num) {
      return Math.round(num).toLocaleString();
    }

    function formatMoneyDisplay(num) {
      return formatNumberWithComma(Number(num).toFixed(2));
    }

    function getRate() {
      if (isManualRate) {
        const manualRate = parseFloat(usdtRateInput.value) || 0;
        return manualRate > 0 ? manualRate : 0;
      }

      return usdtRate || 0;
    }

    function cleanMoneyInput(input) {
      let value = unformatComma(input.value);
      value = value.replace(/[^\d.]/g, "");

      const parts = value.split(".");

      if (parts.length > 2) {
        value = parts[0] + "." + parts.slice(1).join("");
      }

      const splitValue = value.split(".");

      if (splitValue[1] !== undefined) {
        value = splitValue[0] + "." + splitValue[1].slice(0, 2);
      }

      input.value = value === "" ? "" : formatNumberWithComma(value);
    }

    function cleanWin1Odds() {
      let value = win1Odds.value.replace(/[^\d.]/g, "");
      const parts = value.split(".");

      if (parts.length > 2) {
        value = parts[0] + "." + parts.slice(1).join("");
      }

      win1Odds.value = value;
    }

    function getDrawOdds() {
      const main = drawOddsMain.value.trim();
      let decimal = drawOddsDecimal.value.trim();

      if (main === "") return 0;

      if (decimal.length === 0) {
        decimal = "00";
      }

      if (decimal.length === 1) {
        decimal = decimal + "0";
      }

      return parseFloat(`${parseInt(main, 10)}.${decimal.slice(0, 2)}`) || 0;
    }

    function getWin1Odds() {
      return parseFloat(win1Odds.value) || 0;
    }

    function syncDrawFromThb() {
      const rate = getRate();
      const thb = parseAmount(drawAmtThb);

      if (rate > 0 && thb > 0) {
        drawAmtUsdt.value = formatMoneyDisplay(thb / rate);
      } else {
        drawAmtUsdt.value = "";
      }
    }

    function syncDrawFromUsdt() {
      const rate = getRate();
      const usdt = parseAmount(drawAmtUsdt);

      if (rate > 0 && usdt > 0) {
        drawAmtThb.value = formatNumberWithComma(Math.round(usdt * rate).toString());
      } else {
        drawAmtThb.value = "";
      }
    }

    function syncWin1FromThb() {
      const rate = getRate();
      const thb = parseAmount(win1AmtThb);

      if (rate > 0 && thb > 0) {
        win1AmtUsdt.value = formatMoneyDisplay(thb / rate);
      } else {
        win1AmtUsdt.value = "";
      }
    }

    function syncWin1FromUsdt() {
      const rate = getRate();
      const usdt = parseAmount(win1AmtUsdt);

      if (rate > 0 && usdt > 0) {
        win1AmtThb.value = formatNumberWithComma(Math.round(usdt * rate).toString());
      } else {
        win1AmtThb.value = "";
      }
    }

    function forceAutoWin1Amount() {
      const drawThb = parseAmount(drawAmtThb);
      const drawOdds = getDrawOdds();
      const winOdds = getWin1Odds();

      if (!drawThb || !drawOdds || !winOdds) {
        calculate();
        return;
      }

      const win1Thb = Math.round((drawThb * drawOdds) / winOdds);

      win1AmtThb.value = formatNumberWithComma(win1Thb.toString());

      const rate = getRate();

      if (rate > 0) {
        win1AmtUsdt.value = formatMoneyDisplay(win1Thb / rate);
      } else {
        win1AmtUsdt.value = "";
      }

      calculate();
    }

    function calculate() {
      const drawThb = parseAmount(drawAmtThb);
      const drawOdds = getDrawOdds();
      const winOdds = getWin1Odds();
      const win1Thb = parseAmount(win1AmtThb);

      if (!drawThb || !drawOdds || !winOdds || !win1Thb) {
        resultTable.innerHTML = "<tr><td colspan='3'>กรุณากรอกข้อมูลให้ครบ</td></tr>";
        totalInvestment.textContent = "0";
        totalWin12.textContent = "0";
        return;
      }

      const total = drawThb + win1Thb;

      const win1Return = win1Thb * winOdds;
      const drawReturn = drawThb * drawOdds;

      const win1Profit = win1Return - total;
      const drawProfit = drawReturn - total;

      totalInvestment.textContent = format(total);
      totalWin12.textContent = format(win1Thb);

      resultTable.innerHTML = `
        <tr>
          <td>ออกชนะ 1</td>
          <td>${format(win1Return)}</td>
          <td>${format(win1Profit)}</td>
        </tr>

        <tr>
          <td>ออกเสมอ / ต่อ</td>
          <td>${format(drawReturn)}</td>
          <td>${format(drawProfit)}</td>
        </tr>
      `;
    }

    function maximizeWinProfit() {
      const drawThb = parseAmount(drawAmtThb);
      const drawOdds = getDrawOdds();

      if (!drawThb || !drawOdds || drawOdds <= 1) {
        calculate();
        return;
      }

      const win1Thb = Math.round(drawThb * (drawOdds - 1));

      win1AmtThb.value = formatNumberWithComma(win1Thb.toString());

      const rate = getRate();

      if (rate > 0) {
        win1AmtUsdt.value = formatMoneyDisplay(win1Thb / rate);
      } else {
        win1AmtUsdt.value = "";
      }

      calculate();
    }

    function suggestWin1MinimumOdds() {
      const drawThb = parseAmount(drawAmtThb);
      const drawOdds = getDrawOdds();

      if (!drawThb || !drawOdds || drawOdds <= 1) {
        requiredWin1OddsDisplay.textContent = "";
        return;
      }

      const minOdds = (drawThb * drawOdds) / (drawThb * drawOdds - drawThb);

      requiredWin1OddsDisplay.textContent =
        `💡 ค่าน้ำชนะ 1 ควรไม่ต่ำกว่า ${minOdds.toFixed(2)} เพื่อให้กำไรทั้งสองฝั่ง`;
    }

    function clearAll() {
      if (!confirm("คุณแน่ใจหรือไม่ว่าต้องการล้างทั้งหมด?")) return;

      drawAmtThb.value = "";
      drawAmtUsdt.value = "";
      win1AmtThb.value = "";
      win1AmtUsdt.value = "";

      drawOddsMain.value = "";
      drawOddsDecimal.value = "";
      win1Odds.value = "";

      convertThbInput.value = "";
      convertUsdtInput.value = "";
      convertThbResult.textContent = "";
      convertUsdtResult.textContent = "";

      totalInvestment.textContent = "0";
      totalWin12.textContent = "0";
      requiredWin1OddsDisplay.textContent = "";
      resultTable.innerHTML = "<tr><td colspan='3'>-</td></tr>";

      if (isManualRate) {
        usdtRateInput.value = "";
      }
    }

    function updateConverterResults() {
      const rate = getRate();

      if (!rate) {
        convertThbResult.textContent = "";
        convertUsdtResult.textContent = "";
        return;
      }

      const thb = parseAmount(convertThbInput);
      const usdt = parseAmount(convertUsdtInput);

      convertThbResult.textContent = thb > 0 ? `≈ ${formatMoneyDisplay(thb / rate)} USDT` : "";
      convertUsdtResult.textContent = usdt > 0 ? `≈ ${formatMoneyDisplay(usdt * rate)} บาท` : "";
    }

    async function copyTextById(id, btn) {
      const el = document.getElementById(id);
      const text = (el.textContent || "").replace(/^≈\s*/, "").trim();

      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const tmp = document.createElement("textarea");
        tmp.value = text;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand("copy");
        document.body.removeChild(tmp);
      }

      if (btn) {
        const old = btn.textContent;
        btn.textContent = "คัดลอกแล้ว";
        btn.classList.add("copied");

        setTimeout(() => {
          btn.textContent = old;
          btn.classList.remove("copied");
        }, 1200);
      }
    }

    async function pasteToInput(inputId, btn, type) {
      const input = document.getElementById(inputId);
      input.focus();

      try {
        const text = await navigator.clipboard.readText();
        const cleaned = (text || "").replace(/,/g, "").match(/\d*\.?\d{0,2}/)?.[0] || "";

        input.value = cleaned ? formatNumberWithComma(cleaned) : "";

        if (inputId === "draw_amt_thb") {
          syncDrawFromThb();
          forceAutoWin1Amount();
        }

        if (inputId === "draw_amt_usdt") {
          syncDrawFromUsdt();
          forceAutoWin1Amount();
        }

        if (inputId === "win1_amt_thb") {
          syncWin1FromThb();
          calculate();
        }

        if (inputId === "win1_amt_usdt") {
          syncWin1FromUsdt();
          calculate();
        }

        if (btn) {
          const old = btn.textContent;
          btn.textContent = "วางแล้ว";
          btn.classList.add("pasted");

          setTimeout(() => {
            btn.textContent = old;
            btn.classList.remove("pasted");
          }, 1200);
        }
      } catch {
        alert("เบราว์เซอร์ไม่อนุญาตให้อ่าน clipboard อัตโนมัติ");
      }
    }

    async function fetchBinanceRate() {
      const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=USDTTHB");

      if (!res.ok) throw new Error("Binance failed");

      const data = await res.json();
      const rate = parseFloat(data.price);

      if (!rate || rate <= 0) throw new Error("Binance invalid");

      return rate;
    }

    async function fetchCoinGeckoRate() {
      const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=thb");

      if (!res.ok) throw new Error("CoinGecko failed");

      const data = await res.json();
      const rate = parseFloat(data?.tether?.thb);

      if (!rate || rate <= 0) throw new Error("CoinGecko invalid");

      return rate;
    }

    async function loadRate() {
      for (const [fn, label] of [[fetchBinanceRate, "Binance"], [fetchCoinGeckoRate, "CoinGecko"]]) {
        try {
          const rate = await fn();

          usdtRate = rate;
          isManualRate = false;

          usdtRateText.style.display = "inline-block";
          usdtRateInput.style.display = "none";
          usdtRateText.textContent = formatMoneyDisplay(rate);
          rateSource.textContent = `อ้างอิง: ${label}`;

          updateConverterResults();
          forceAutoWin1Amount();

          return;
        } catch (e) {}
      }

      usdtRate = 0;
      isManualRate = true;

      usdtRateText.style.display = "none";
      usdtRateInput.style.display = "inline-block";
      usdtRateInput.value = "";
      rateSource.textContent = "กรอกค่าเงินเอง";

      updateConverterResults();
      forceAutoWin1Amount();
    }

    drawAmtThb.addEventListener("input", () => {
      cleanMoneyInput(drawAmtThb);
      syncDrawFromThb();
      forceAutoWin1Amount();
    });

    drawAmtUsdt.addEventListener("input", () => {
      cleanMoneyInput(drawAmtUsdt);
      syncDrawFromUsdt();
      forceAutoWin1Amount();
    });

    win1AmtThb.addEventListener("input", () => {
      cleanMoneyInput(win1AmtThb);
      syncWin1FromThb();
      calculate();
    });

    win1AmtUsdt.addEventListener("input", () => {
      cleanMoneyInput(win1AmtUsdt);
      syncWin1FromUsdt();
      calculate();
    });

    drawOddsMain.addEventListener("input", () => {
      drawOddsMain.value = drawOddsMain.value.replace(/[^\d]/g, "").slice(0, 1);

      if (drawOddsMain.value.length === 1) {
        drawOddsDecimal.focus();
      }

      suggestWin1MinimumOdds();
      forceAutoWin1Amount();
    });

    drawOddsDecimal.addEventListener("input", () => {
      drawOddsDecimal.value = drawOddsDecimal.value.replace(/[^\d]/g, "").slice(0, 2);

      suggestWin1MinimumOdds();
      forceAutoWin1Amount();
    });

    win1Odds.addEventListener("input", () => {
      cleanWin1Odds();
      forceAutoWin1Amount();
    });

    usdtRateInput.addEventListener("input", () => {
      updateConverterResults();

      if (parseAmount(drawAmtThb) > 0) {
        syncDrawFromThb();
      }

      forceAutoWin1Amount();
    });

    convertThbInput.addEventListener("input", () => {
      cleanMoneyInput(convertThbInput);
      updateConverterResults();
    });

    convertUsdtInput.addEventListener("input", () => {
      cleanMoneyInput(convertUsdtInput);
      updateConverterResults();
    });

    const navOrder = [
      drawAmtThb,
      drawOddsMain,
      drawOddsDecimal,
      win1Odds
    ];

    navOrder.forEach((input, index) => {
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();

          if (index + 1 < navOrder.length) {
            navOrder[index + 1].focus();
          }
        }
      });
    });

    window.addEventListener("DOMContentLoaded", () => {
      loadRate();
      calculate();
    });
  </script>
</body>
</html>
