<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>2Table CalculatorMax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: auto;
      background-color: #f4f6f9;
      color: #222;
    }
    h2 {
      text-align: center;
      color: #0066cc;
      font-size: 28px;
      margin-bottom: 15px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 20px;
      background-color: #fff;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 14px;
      text-align: center;
      font-size: 18px;
    }
    th {
      background-color: #e6f0ff;
      color: #003366;
      font-weight: bold;
    }
    .num-input {
      width: 120px;
      font-size: 20px;
      padding: 10px;
      text-align: right;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .button-container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin-bottom: 25px;
    }
    button {
      padding: 14px 22px;
      font-size: 18px;
      border-radius: 6px;
      border: none;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      min-width: 200px;
    }
    button:hover {
      background-color: #005bb5;
    }
    .summary {
      font-size: 20px;
      font-weight: bold;
      margin: 10px 0;
      text-align: center;
    }
    .summary span {
      color: #003366;
    }
    .odds-group {
      display: flex;
      align-items: center;
      gap: 5px;
      justify-content: center;
    }
    .odds-group input {
      margin: 0;
    }
    .odds-group button {
      min-width: auto;
      padding: 6px 10px;
      font-size: 14px;
    }
    .danger-btn {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .danger-btn:hover {
      background-color: #c82333;
    }
    .amount-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .usdt-hint {
      font-size: 16px;
      color: #dc3545;
      font-weight: bold;
      line-height: 1.3;
      min-height: 20px;
    }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .left-panel {
      flex: 1 1 320px;
      text-align: left;
    }
    .left-panel h2 {
      text-align: left;
      margin-top: 0;
      margin-bottom: 10px;
    }
    .rate-box {
      font-size: 16px;
      font-weight: bold;
      color: #003366;
      text-align: left;
    }
    .rate-value {
      display: inline-block;
      min-width: 120px;
      color: #dc3545;
      font-size: 18px;
      font-weight: bold;
      margin: 0 6px;
    }
    .rate-input {
      width: 140px;
      font-size: 18px;
      font-weight: bold;
      padding: 6px 8px;
      text-align: right;
      border: 1px solid #ccc;
      border-radius: 6px;
      color: #dc3545;
    }
    .rate-source {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      color: #666;
      font-weight: normal;
    }
    .converter-box {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      flex: 0 1 360px;
      margin-bottom: 0;
    }
    .converter-title {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #003366;
      margin-bottom: 12px;
    }
    .converter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      align-items: flex-start;
    }
    .converter-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 150px;
    }
    .converter-item label {
      font-size: 14px;
      font-weight: bold;
      color: #444;
    }
    .converter-result {
      font-size: 14px;
      color: #dc3545;
      font-weight: bold;
      min-height: 18px;
      text-align: center;
    }
    @media (max-width: 768px) {
      .top-row {
        flex-direction: column;
      }
      .left-panel,
      .converter-box {
        width: 100%;
      }
      .left-panel h2,
      .rate-box {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="top-row">
    <div class="left-panel">
      <h2>2 CalculatorMax By Super</h2>

      <div class="rate-box">
        อัตรา 1 USDT =
        <span id="usdt_rate_text" class="rate-value">กำลังโหลด...</span>
        <input type="number" id="usdt_rate_input" class="rate-input" step="0.01" min="0" style="display: none;" placeholder="กรอกค่าเงิน" />
        บาท
        <span id="rate_source" class="rate-source"></span>
      </div>
    </div>

    <div class="converter-box">
      <div class="converter-title">แปลงสกุลเงิน</div>
      <div class="converter-grid">
        <div class="converter-item">
          <label for="convert_thb_input">บาท → USDT</label>
          <input type="text" id="convert_thb_input" class="num-input money-input" />
          <div class="converter-result" id="convert_thb_result"></div>
        </div>
        <div class="converter-item">
          <label for="convert_usdt_input">USDT → บาท</label>
          <input type="text" id="convert_usdt_input" class="num-input money-input" />
          <div class="converter-result" id="convert_usdt_result"></div>
        </div>
      </div>
    </div>
  </div>

  <table>
    <thead>
      <tr><th>เว็บ</th><th>เงินทุน</th><th>ค่าน้ำ</th></tr>
    </thead>
    <tbody>
      <tr>
        <td>เสมอ / ต่อ / ต่ำ</td>
        <td>
          <div class="amount-group">
            <input type="text" id="draw_amt" class="num-input money-input" />
            <div class="usdt-hint" id="draw_usdt_hint"></div>
          </div>
        </td>
        <td>
          <div class="odds-group">
            <input type="number" id="draw_odds_main" class="num-input" min="0" style="width: 70px;" /> .
            <input type="number" id="draw_odds_decimal" class="num-input" min="0" max="99" style="width: 70px;" />
            <button class="danger-btn" onclick="draw_odds_main.value=''; draw_odds_decimal.value=''; calculate(); suggestWin1MinimumOdds();">ล้าง</button>
          </div>
        </td>
      </tr>
      <tr>
        <td>ชนะ 1</td>
        <td>
          <div class="amount-group">
            <input type="text" id="win1_amt" class="num-input money-input" />
            <div class="usdt-hint" id="win1_usdt_hint"></div>
          </div>
        </td>
        <td>
          <div class="odds-group">
            <input type="number" id="win1_odds" class="num-input" min="0" step="0.01" />
            <button class="danger-btn" onclick="win1_odds.value=''; calculate();">ล้าง</button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="summary">รวมเงินทุนทั้งหมด: <span id="total_investment">0</span> บาท</div>
  <div class="summary">รวมทุนฝั่งชนะ 1: <span id="total_win12">0</span> บาท</div>

  <div class="summary" id="required-win1-odds" style="color: #c43d00; font-size: 18px;"></div>

  <div class="button-container">
    <button onclick="resetWinBets()">เฉลี่ยกำไรให้เท่ากัน</button>
    <button onclick="maximizeWinProfit()">คำนวณกำไรสูงสุด</button>
    <button onclick="clearAll()">🧹 ล้างทั้งหมด</button>
  </div>

  <h2>ผลการคำนวณ</h2>
  <table>
    <thead>
      <tr><th>กรณี</th><th>ยอดรวม</th><th>กำไร</th></tr>
    </thead>
    <tbody id="result-table"><tr><td colspan="3">-</td></tr></tbody>
  </table>

<script>
  const drawAmt = document.getElementById("draw_amt");
  const drawOddsMain = document.getElementById("draw_odds_main");
  const drawOddsDecimal = document.getElementById("draw_odds_decimal");
  const win1Amt = document.getElementById("win1_amt");
  const win1Odds = document.getElementById("win1_odds");
  const totalInvestment = document.getElementById("total_investment");
  const totalWin12 = document.getElementById("total_win12");
  const resultTable = document.getElementById("result-table");
  const requiredWin1OddsDisplay = document.getElementById("required-win1-odds");
  const drawUsdtHint = document.getElementById("draw_usdt_hint");
  const win1UsdtHint = document.getElementById("win1_usdt_hint");
  const usdtRateText = document.getElementById("usdt_rate_text");
  const usdtRateInput = document.getElementById("usdt_rate_input");
  const rateSource = document.getElementById("rate_source");
  const convertThbInput = document.getElementById("convert_thb_input");
  const convertUsdtInput = document.getElementById("convert_usdt_input");
  const convertThbResult = document.getElementById("convert_thb_result");
  const convertUsdtResult = document.getElementById("convert_usdt_result");

  let usdtRate = 0;
  let isManualRate = false;

  function formatNumberWithComma(num) {
    const str = num.toString();
    const parts = str.split(".");
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    return parts.join(".");
  }

  function unformatComma(value) {
    return value.replace(/,/g, "");
  }

  document.querySelectorAll(".money-input").forEach(input => {
    input.addEventListener("input", () => {
      let raw = unformatComma(input.value);
      if (!/^\d*\.?\d{0,2}$/.test(raw)) return;
      input.value = raw === "" ? "" : formatNumberWithComma(raw);
    });
  });

  function parseAmount(input) {
    return parseFloat(unformatComma(input.value)) || 0;
  }

  function format(num) {
    return Math.round(num).toLocaleString();
  }

  function formatMoneyDisplay(num) {
    return formatNumberWithComma(Number(num).toFixed(2));
  }

  function getRate() {
    if (isManualRate) {
      const manualRate = parseFloat(usdtRateInput.value) || 0;
      return manualRate > 0 ? manualRate : 0;
    }
    return usdtRate || 0;
  }

  function getDrawOdds() {
    let main = parseInt(drawOddsMain.value) || 0;
    let decimal = drawOddsDecimal.value.trim();
    if (decimal.length === 1) decimal += "0";
    if (decimal.length === 0) decimal = "00";
    return parseFloat(`${main}.${decimal.slice(0, 2)}`);
  }

  async function fetchBinanceRate() {
    const response = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=USDTTHB", {
      method: "GET"
    });
    if (!response.ok) throw new Error("Binance failed");
    const data = await response.json();
    const rate = parseFloat(data.price);
    if (!rate || rate <= 0) throw new Error("Binance invalid");
    return rate;
  }

  async function fetchCoinGeckoRate() {
    const response = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=thb", {
      method: "GET"
    });
    if (!response.ok) throw new Error("CoinGecko failed");
    const data = await response.json();
    const rate = parseFloat(data?.tether?.thb);
    if (!rate || rate <= 0) throw new Error("CoinGecko invalid");
    return rate;
  }

  async function loadRate() {
    try {
      const rate = await fetchBinanceRate();
      usdtRate = rate;
      isManualRate = false;
      usdtRateText.style.display = "inline-block";
      usdtRateInput.style.display = "none";
      usdtRateText.textContent = formatMoneyDisplay(rate);
      rateSource.textContent = "อ้างอิง: Binance";
      updateUsdtHints();
      updateConverterResults();
      return;
    } catch (e) {}

    try {
      const rate = await fetchCoinGeckoRate();
      usdtRate = rate;
      isManualRate = false;
      usdtRateText.style.display = "inline-block";
      usdtRateInput.style.display = "none";
      usdtRateText.textContent = formatMoneyDisplay(rate);
      rateSource.textContent = "อ้างอิง: CoinGecko";
      updateUsdtHints();
      updateConverterResults();
      return;
    } catch (e) {}

    usdtRate = 0;
    isManualRate = true;
    usdtRateText.style.display = "none";
    usdtRateInput.style.display = "inline-block";
    usdtRateInput.value = "";
    rateSource.textContent = "กรอกค่าเงินเอง";
    updateUsdtHints();
    updateConverterResults();
  }

  function updateUsdtHints() {
    const rate = getRate();

    if (!rate) {
      drawUsdtHint.textContent = "";
      win1UsdtHint.textContent = "";
      return;
    }

    const drawValue = parseAmount(drawAmt);
    const win1Value = parseAmount(win1Amt);

    drawUsdtHint.textContent = drawValue > 0
      ? `≈ ${formatMoneyDisplay(drawValue / rate)} USDT`
      : "";

    win1UsdtHint.textContent = win1Value > 0
      ? `≈ ${formatMoneyDisplay(win1Value / rate)} USDT`
      : "";
  }

  function updateConverterResults() {
    const rate = getRate();

    if (!rate) {
      convertThbResult.textContent = "";
      convertUsdtResult.textContent = "";
      return;
    }

    const thbValue = parseAmount(convertThbInput);
    const usdtValue = parseAmount(convertUsdtInput);

    convertThbResult.textContent = thbValue > 0
      ? `≈ ${formatMoneyDisplay(thbValue / rate)} USDT`
      : "";

    convertUsdtResult.textContent = usdtValue > 0
      ? `≈ ${formatMoneyDisplay(usdtValue * rate)} บาท`
      : "";
  }

  function calculate() {
    let d = parseAmount(drawAmt);
    let o = getDrawOdds();
    let a = parseFloat(win1Odds.value) || 0;
    let x = parseAmount(win1Amt);

    if (d === 0 || o === 0 || a === 0) {
      resultTable.innerHTML = "<tr><td colspan='3'>กรุณากรอกข้อมูลให้ครบ</td></tr>";
      totalInvestment.textContent = "0";
      totalWin12.textContent = "0";
      return;
    }

    let total = d + x;
    totalInvestment.textContent = format(total);
    totalWin12.textContent = format(x);

    const results = [
      { name: "ออกชนะ 1", sum: x * a },
      { name: "ออกเสมอ / ต่อ", sum: d * o }
    ];

    resultTable.innerHTML = "";
    results.forEach(r => {
      const profit = r.sum - total;
      resultTable.innerHTML += `<tr><td>${r.name}</td><td>${format(r.sum)}</td><td>${format(profit)}</td></tr>`;
    });
  }

  function resetWinBets() {
    let d = parseAmount(drawAmt);
    let o = getDrawOdds();
    let a = parseFloat(win1Odds.value) || 0;

    if (d === 0 || o === 0 || a === 0) return;

    let target = d * o;
    win1Amt.value = formatNumberWithComma(Math.round(target / a));
    updateUsdtHints();
    calculate();
  }

  function maximizeWinProfit() {
    let d = parseAmount(drawAmt);
    let o = getDrawOdds();
    let a = parseFloat(win1Odds.value) || 0;

    if (d === 0 || o === 0 || a === 0 || a <= 1) return;

    let profitFromDraw = d * (o - 1);
    win1Amt.value = formatNumberWithComma(Math.round(profitFromDraw));
    updateUsdtHints();
    calculate();
  }

  function clearAll() {
    if (!confirm("คุณแน่ใจหรือไม่ว่าต้องการล้างทั้งหมด?")) return;
    [drawAmt, win1Amt, drawOddsMain, drawOddsDecimal, win1Odds, convertThbInput, convertUsdtInput].forEach(el => el.value = "");
    totalInvestment.textContent = "0";
    totalWin12.textContent = "0";
    resultTable.innerHTML = "<tr><td colspan='3'>-</td></tr>";
    requiredWin1OddsDisplay.textContent = "";
    drawUsdtHint.textContent = "";
    win1UsdtHint.textContent = "";
    convertThbResult.textContent = "";
    convertUsdtResult.textContent = "";
    if (isManualRate) usdtRateInput.value = "";
  }

  function suggestWin1MinimumOdds() {
    let d = parseAmount(drawAmt);
    let o = getDrawOdds();

    if (d === 0 || o === 0) {
      requiredWin1OddsDisplay.textContent = "";
      return;
    }

    let targetReturn = d * o;
    let minWin1Odds = targetReturn / (targetReturn - d);
    requiredWin1OddsDisplay.textContent = `💡 ค่าน้ำชนะ 1 ควรไม่ต่ำกว่า ${minWin1Odds.toFixed(2)} เพื่อให้กำไรทั้งสองฝั่ง`;
  }

  const navOrder = [drawOddsMain, drawOddsDecimal, win1Odds];
  navOrder.forEach((input, i) => {
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        if (i + 1 < navOrder.length) navOrder[i + 1].focus();
      }
    });
  });

  drawAmt.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      drawOddsMain.focus();
    }
  });

  drawOddsMain.addEventListener("input", () => {
    drawOddsMain.value = drawOddsMain.value.slice(0, 1);
    if (drawOddsMain.value.length === 1) drawOddsDecimal.focus();
    suggestWin1MinimumOdds();
  });

  drawOddsDecimal.addEventListener("input", () => {
    drawOddsDecimal.value = drawOddsDecimal.value.slice(0, 2);
    suggestWin1MinimumOdds();
  });

  drawAmt.addEventListener("input", () => {
    updateUsdtHints();
    suggestWin1MinimumOdds();
  });

  win1Amt.addEventListener("input", updateUsdtHints);

  usdtRateInput.addEventListener("input", () => {
    updateUsdtHints();
    updateConverterResults();
  });

  convertThbInput.addEventListener("input", updateConverterResults);
  convertUsdtInput.addEventListener("input", updateConverterResults);

  window.addEventListener("DOMContentLoaded", () => {
    loadRate();
    updateUsdtHints();
    updateConverterResults();
    calculate();
  });

  [drawAmt, win1Amt].forEach(i => i.addEventListener("input", calculate));
  [drawOddsMain, drawOddsDecimal, win1Odds].forEach(i => i.addEventListener("input", resetWinBets));
</script>
</body>
</html>
